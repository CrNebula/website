<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta id="app-viewport" name="viewport" content="width=1280, initial-scale=1, user-scalable=no" />
    <script>
      (function () {
        var designWidth = 1280;
        var viewport = document.getElementById('app-viewport');
        if (!viewport) return;
        var screenWidth = window.screen && window.screen.width ? window.screen.width : window.innerWidth;
        var scale = Math.min(screenWidth / designWidth, 1);
        viewport.setAttribute(
          'content',
          'width=' + designWidth + ', initial-scale=' + scale + ', user-scalable=no'
        );
      })();
    </script>
    <title>Company Site</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
